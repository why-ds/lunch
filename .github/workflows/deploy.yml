# GitHub Actions - 백엔드 자동 배포
# main 브랜치에 push하면 자동으로 빌드 + 서버 배포
name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 세팅
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 빌드
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # 4. 서버에 jar 업로드 + 재시작
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # 기존 Spring Boot 종료
            sudo pkill -f 'java -jar' || true
            sleep 2

      - name: Copy jar to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "build/libs/lunch-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/"
          strip_components: 2

      - name: Start Application
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /home/ubuntu
            sudo nohup java -jar lunch-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
            sleep 5
            echo "Deploy complete!"