name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # SSH 키 파일 만들어서 직접 접속
      - name: Deploy
        env:
          SERVER_KEY: ${{ secrets.SERVER_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # SSH 키 파일 생성
          echo "$SERVER_KEY" > key.pem
          chmod 600 key.pem

          # jar 파일 서버로 복사
          scp -o StrictHostKeyChecking=no -i key.pem build/libs/lunch-0.0.1-SNAPSHOT.jar $SERVER_USER@$SERVER_HOST:/home/ubuntu/

          # 서버에서 재시작
          ssh -o StrictHostKeyChecking=no -i key.pem $SERVER_USER@$SERVER_HOST << 'EOF'
            pkill -f 'java -jar' || true
            sleep 2
            cd /home/ubuntu
            nohup java -jar lunch-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
            sleep 3
            echo "deploy done"
          EOF

          # 키 파일 삭제
          rm -f key.pem