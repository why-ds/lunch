# auto deploy
name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Deploy
        env:
          SERVER_KEY: ${{ secrets.SERVER_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "$SERVER_KEY" > key.pem
          chmod 600 key.pem
          scp -o StrictHostKeyChecking=no -i key.pem build/libs/lunch-0.0.1-SNAPSHOT.jar $SERVER_USER@$SERVER_HOST:/home/ubuntu/
          ssh -o StrictHostKeyChecking=no -i key.pem $SERVER_USER@$SERVER_HOST "pkill -f 'java -jar' || true; sleep 2; cd /home/ubuntu; nohup java -jar lunch-0.0.1-SNAPSHOT.jar > app.log 2>&1 & sleep 3; echo done"
          rm -f key.pem